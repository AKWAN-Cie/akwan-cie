<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AKWAN Cie</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #000000;
      --white: #ffffff;
      --silver: rgba(255, 255, 255, 0.84);
      --muted: rgba(255, 255, 255, 0.58);
      --soft: rgba(255, 255, 255, 0.30);
      --line: rgba(255, 255, 255, 0.08);
      --glow: rgba(255, 255, 255, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #000;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--white);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.07), transparent 22%),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03), transparent 42%),
        #000000;
      opacity: 0;
      animation: pageFade 1.2s ease forwards;
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.025;
      background-image:
        radial-gradient(circle at 25% 25%, rgba(255,255,255,0.28) 0.5px, transparent 0.8px),
        radial-gradient(circle at 75% 75%, rgba(255,255,255,0.18) 0.5px, transparent 0.8px);
      background-size: 28px 28px, 34px 34px;
      mix-blend-mode: soft-light;
    }

    .hero {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
    }

    .content {
      width: min(94vw, 1100px);
      text-align: center;
      position: relative;
    }

    .content::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 46%;
      transform: translate(-50%, -50%);
      width: min(70vw, 760px);
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(255,255,255,0.10) 0%,
        rgba(255,255,255,0.04) 28%,
        rgba(255,255,255,0.00) 70%);
      filter: blur(28px);
      z-index: -1;
      animation: glowPulse 5.5s ease-in-out infinite;
    }

    .logo-wrap {
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(10px);
      animation: riseIn 1s ease forwards;
      animation-delay: 0.2s;
    }

    .logo {
      width: min(360px, 62vw);
      max-width: 360px;
      min-width: 180px;
      height: auto;
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 0 24px rgba(255,255,255,0.08));
      animation: logoFloat 4.5s ease-in-out infinite;
    }

    h1 {
      margin: 0;
      font-size: clamp(44px, 8vw, 96px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.22em;
      color: #ffffff;
      text-shadow: 0 0 16px rgba(255,255,255,0.08);
      opacity: 0;
      transform: translateY(10px);
      animation: riseIn 1s ease forwards;
      animation-delay: 0.45s;
    }

    .subtitle {
      max-width: 980px;
      margin: 28px auto 0 auto;
      font-size: clamp(18px, 2vw, 30px);
      line-height: 1.5;
      font-weight: 400;
      color: var(--silver);
      opacity: 0;
      transform: translateY(10px);
      animation: riseIn 1s ease forwards;
      animation-delay: 0.7s;
    }

    .location {
      margin: 26px 0 0 0;
      font-size: clamp(15px, 1.5vw, 22px);
      font-weight: 500;
      color: var(--muted);
      opacity: 0;
      transform: translateY(10px);
      animation: riseIn 1s ease forwards;
      animation-delay: 0.95s;
    }

    .footer {
      margin: 88px 0 0 0;
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--soft);
      opacity: 0;
      transform: translateY(10px);
      animation: riseIn 1s ease forwards;
      animation-delay: 1.2s;
    }

    @keyframes pageFade {
      to {
        opacity: 1;
      }
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes logoFloat {
      0%, 100% {
        transform: translateY(0px) scale(1);
      }
      50% {
        transform: translateY(-8px) scale(1.012);
      }
    }

    @keyframes glowPulse {
      0%, 100% {
        opacity: 0.85;
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.04);
      }
    }

    @media (max-width: 640px) {
      .logo {
        width: min(280px, 70vw);
      }

      .footer {
        margin-top: 56px;
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <div class="noise"></div>

  <main class="hero">
    <section class="content">
      <div class="logo-wrap">
        <img src="logo-akwan.png" alt="AKWAN logo" class="logo" />
      </div>

      <h1>AKWAN Cie</h1>

      <p class="subtitle">
        Strategic investment and project development company
      </p>

      <p class="location">
        Europe — 2026
      </p>

      <p class="footer">
        A new chapter begins.
      </p>
    </section>
  </main>
</body>

</html>
